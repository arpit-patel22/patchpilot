spring.profiles.default=dev
spring.application.name=PatchPilot
server.port=8080

spring.config.import=optional:file:.env[.properties]

# PostgreSQL datasource — values resolved from .env
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Suppress open-in-view warning
spring.jpa.open-in-view=false
# Treat unmapped paths as 404 (not 500 via static-resource fallback)
spring.web.resources.add-mappings=false